<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ENGO 551 - Ante R. MQTT App</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h3>Geoweb MQTT Application</h3>
        </header>
        
        <div class="controls">
            <div class="input-group">
                <input type="text" id="host" placeholder="Broker (test.mosquitto.org)" value="test.mosquitto.org">
                <input type="number" id="port" placeholder="Port (8081)" value="8081">
            </div>
            <div class="button-group">
                <button id="connectBtn" onclick="toggleConnection()">Start Connection</button>
                <button id="shareBtn" onclick="shareStatus()" disabled>Share My Status</button>
            </div>
            <div id="statusMsg" class="status-disconnected">Status: Disconnected</div>
        </div>

        <section class="controls manual-publish">
            <h4>Manual Publish</h4>
            <div class="input-group">
                <input type="text" id="customTopic" placeholder="Any Topic (e.g. uofc/test)">
                <input type="text" id="customMsg" placeholder="Your Message">
            </div>
            <button id="pubBtn" onclick="publishAny()" disabled>Publish to Topic</button>
        </section>
        <div id="map"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
